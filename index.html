<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="./assets/css/style.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="cont">
    <div class="card">
      <div class="card__image"></div>
      <div class="card__info">
        <div class="card__title">Equilibrium #3429</div>
        <p class="card__desc">Our Equilibrium collection promotes balance and calm.</p>
        <div class="card__meta">
          <h2 class="card__time">0.041 ETH</h2>
          <div class="card__duration">3 days left</div>
          <div class="card__creator">
            <img class="card__avatar" src="./assets/images/image-avatar.png" alt="" >
            <p class="card__avatar_desc">Creation of Jules Wyvern</p></div>
        </div>
      </div>
    </div>
  </div>

  

  

  
  
  
  

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
